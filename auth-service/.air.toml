[build]
  cmd = "go build -o ./tmp/server ./cmd/server/main.go"
  bin = "./tmp/server"
  full_bin = ""
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "db"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  delay = 1000
  stop_on_error = true
  log = "air.log"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
